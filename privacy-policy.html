<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy | HOPPP!</title>
    <meta name="description" content="Privacy Policy for HOPPP! app - Your Phone, But It Argues Back. Learn how we handle your data." />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/png" href="../assets/icon-512.png" />
    <link rel="canonical" href="https://hoppp.kobar.co/privacy-policy.html" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"], pixel: ['"Press Start 2P"', "cursive"] },
            colors: { gold: { 400: "#d4b87a", 500: "#c9a96e", 600: "#b8944f" }, dusk: { 900: "#0a0a2e", 800: "#1a1040" } },
          },
        },
      };
    </script>
    <style>
      body { font-family: "Inter", sans-serif; background: #0a0a2e; min-height: 100vh; }
      .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
      .glass-strong { background: rgba(255,255,255,0.09); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.16); }
      .app-icon { background: linear-gradient(135deg, #2d1b69 0%, #5b3a8c 50%, #c76b8f 100%); box-shadow: 0 0 30px rgba(91,58,140,0.5); }
      .cms-content h2 { color: rgba(255,255,255,0.8); font-weight: 500; font-size: 1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
      .cms-content p { margin-bottom: 0.75rem; }
      .cms-content ul, .cms-content ol { padding-left: 1.25rem; margin-bottom: 0.75rem; list-style-type: disc; }
      .cms-content li { margin-bottom: 0.375rem; color: rgba(255,255,255,0.55); }
      .cms-content a { color: rgba(212,184,122,0.75); transition: color 0.2s; }
      .cms-content a:hover { color: #d4b87a; }
      .cms-content strong { color: rgba(255,255,255,0.6); font-weight: 600; }
    </style>
  </head>
  <body class="text-white antialiased">
    <nav class="sticky top-0 z-50 glass">
      <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 group">
          <div class="w-8 h-8 rounded-lg app-icon flex items-center justify-center transition-transform duration-300 group-hover:scale-110">
            <img src="../assets/icon-512.png" alt="HOPPP! logo" />
          </div>
          <span class="font-pixel text-[10px] sm:text-xs text-gold-400 tracking-widest">HOPPP!</span>
        </a>
        <a href="/" class="flex items-center gap-2 px-4 py-2 rounded-full glass text-xs sm:text-sm text-white/70 hover:text-white hover:bg-white/10 transition-all duration-300">&larr; Back to Home</a>
      </div>
    </nav>

    <main class="max-w-3xl mx-auto px-5 sm:px-8 py-12 sm:py-20">
      <div class="glass-strong rounded-2xl sm:rounded-3xl p-6 sm:p-12" style="border: 1px solid rgba(255,255,255,0.16)">
        <div id="content-loading" class="text-center py-12 text-white/30 text-sm">Loading...</div>
        <div id="content-error" class="hidden text-center py-12 text-white/30 text-sm">Failed to load. <a href="mailto:privacy@kobar.co" class="text-gold-400/70 hover:text-gold-400">privacy@kobar.co</a></div>
        <div id="content-body" class="hidden">
          <h1 class="text-2xl sm:text-3xl font-light tracking-tight text-white mb-2" id="content-title"></h1>
          <p class="text-white/30 text-[12px] mb-8" id="content-date"></p>
          <div class="text-[14px] text-white/65 leading-relaxed space-y-2 cms-content" id="content-html"></div>
        </div>
      </div>
    </main>

    <footer class="py-8 border-t border-white/[0.08]">
      <div class="max-w-4xl mx-auto px-5 sm:px-8 flex flex-col items-center gap-5 sm:flex-row sm:justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-6 h-6 rounded-md app-icon flex items-center justify-center">
            <img src="../assets/icon-512.png" alt="HOPPP! logo" />
          </div>
          <span class="font-pixel text-[7px] text-white/40 tracking-widest">HOPPP!</span>
        </div>
        <p class="text-[12px] text-white/35 font-light">&copy; 2026 HOPPP!</p>
        <div class="flex items-center gap-5">
          <a href="/privacy-policy.html" class="text-[12px] text-white/60 hover:text-white/70 transition-colors">Privacy Policy</a>
          <a href="/terms-of-use.html" class="text-[12px] text-white/40 hover:text-white/70 transition-colors">Terms of Use</a>
        </div>
      </div>
    </footer>

    <script>
      const API = ['localhost', '127.0.0.1'].includes(location.hostname)
        ? 'http://localhost:3001'
        : 'https://hoppp-api-2hw2qw3tea-ts.a.run.app';

      fetch(`${API}/web/content/privacy-policy`)
        .then(r => r.json())
        .then(({ data }) => {
          document.getElementById('content-title').textContent = data.title;
          document.getElementById('content-date').textContent = 'Last updated: ' + new Date(data.date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
          document.getElementById('content-html').innerHTML = data.html;
          document.getElementById('content-loading').classList.add('hidden');
          document.getElementById('content-body').classList.remove('hidden');
          document.title = data.title + ' | HOPPP!';
        })
        .catch(() => {
          document.getElementById('content-loading').classList.add('hidden');
          document.getElementById('content-error').classList.remove('hidden');
        });
    </script>
  </body>
</html>
